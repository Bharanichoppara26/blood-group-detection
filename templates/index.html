<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fingerprint to Blood Group Classifier</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Styling */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Heading Styling */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #bb86fc; /* Purple accent for contrast */
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* Upload Box Styling */
        .upload-box {
            background: #1e1e1e;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .upload-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
        }

        /* Input Styling */
        input[type="file"] {
            background: #2c2c2c;
            color: #e0e0e0;
            padding: 10px;
            border: 2px solid #bb86fc;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        input[type="file"]:hover {
            background: #3a3a3a;
            border-color: #ff6f00; /* Orange accent for hover effect */
        }

        input[type="submit"] {
            background: #bb86fc;
            color: #121212;
            font-weight: bold;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        input[type="submit"]:hover {
            background: #ff6f00;
            transform: scale(1.05);
        }

        /* Prediction Section Styling */
        .prediction {
            margin-top: 30px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .prediction p {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #bb86fc;
        }

        .prediction img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .upload-box, .prediction {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <h1>Fingerprint to Blood Group Classifier</h1>

    <div class="upload-box">
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="image" required>
            <br><br>
            <input type="submit" value="Upload and Predict">
        </form>
    </div>

    {% if prediction %}
        <div class="prediction">
            <p><strong>Predicted Blood Group:</strong> {{ prediction }}</p>
            <img src="{{ image_path }}" alt="Uploaded Fingerprint Image">
        </div>
    {% endif %}
</body>
</html>
